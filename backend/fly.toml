# Fly.io — FastAPI + Neon
# From backend/:  fly launch  (or fly apps create + fly deploy)
# Secrets:       fly secrets set DATABASE_URL="postgresql+asyncpg://..."

app = "rlhf-annotation-api"
primary_region = "syd"

[build]
  dockerfile = "Dockerfile"

[env]
  CORS_ORIGINS = "https://rlhf-studio.intelliforge.tech,https://rlhf-annotation-frontend.vercel.app"

[http_service]
  internal_port = 8000
  force_https = true
  auto_stop_machines = "suspend"
  auto_start_machines = true
  min_machines_running = 1
  processes = ["app"]

  [[http_service.checks]]
    interval = "15s"
    timeout = "5s"
    grace_period = "10s"
    method = "GET"
    path = "/api/v1/health"

[[vm]]
  memory = "512mb"
  cpu_kind = "shared"
  cpus = 1
