version: 2

updates:
  # Python backend (pip)
  - package-ecosystem: pip
    directory: /backend
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 5
    labels: ["dependencies", "backend"]
    groups:
      minor-and-patch:
        update-types: ["minor", "patch"]
    reviewers:
      - gengirish

  # Node frontend (npm)
  - package-ecosystem: npm
    directory: /frontend
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 5
    labels: ["dependencies", "frontend"]
    groups:
      minor-and-patch:
        update-types: ["minor", "patch"]
    reviewers:
      - gengirish

  # GitHub Actions
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 3
    labels: ["dependencies", "ci"]
