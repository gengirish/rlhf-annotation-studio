# RLHF Annotation Studio — Next.js + FastAPI on one host
# 1. Copy .env.example → .env in repo root and set DATABASE_URL (Neon +asyncpg)
# 2. docker compose up --build
# 3. Open http://localhost:8080/auth  (or http://YOUR_SERVER_IP:8080/auth)

services:
  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    # Compose reads `.env` next to this file for ${VAR} substitution below.
    environment:
      DATABASE_URL: ${DATABASE_URL:-}
      DATABASE_URL_SYNC: ${DATABASE_URL_SYNC:-}
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost:8080,http://127.0.0.1:8080,http://localhost,http://127.0.0.1}
      DEBUG: ${DEBUG:-false}
    expose:
      - "8000"
    restart: unless-stopped

  web:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    environment:
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:8000}
    ports:
      - "${HTTP_PORT:-8080}:3000"
    depends_on:
      - api
    restart: unless-stopped
